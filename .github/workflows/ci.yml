name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "15 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    timeout-minutes: 10
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.81.0
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo test --all --locked
      - name: Reproduce the checked-in model and report
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked -- train \
            --output target/reproduced-model.json \
            --report target/reproduced-report.json
          cmp models/eliza-intent-v1.json target/reproduced-model.json
          cmp reports/eliza-intent-v1.json target/reproduced-report.json
      - name: Reproduce and verify the open-set v3 artifact bundle
        shell: bash
        run: |
          set -euo pipefail
          cargo run --locked -- train-v3 --output target/reproduced-open-set-v3
          diff --recursive --brief artifacts/eliza-open-set-v3 target/reproduced-open-set-v3
          cargo run --locked -- bundle verify --bundle artifacts/eliza-open-set-v3
          cargo run --locked -- bundle reproduce --bundle artifacts/eliza-open-set-v3

  site:
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1
      - run: node scripts/release-contract.mjs audit-policy
      - run: node --test site/tests/*.test.mjs
      - run: node site/scripts/validate-site.mjs
