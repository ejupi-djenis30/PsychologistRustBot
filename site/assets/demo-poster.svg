<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ELIZA Lab interactive trace</title>
  <desc id="desc">A dialogue and its matching feeling-reflection rule</desc>
  <rect width="1600" height="900" fill="#231f20"/>
  <path d="M0 0h1600v900H0z" fill="url(#grid)" opacity=".18"/>
  <defs><pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0v48" fill="none" stroke="#f2ecdf" stroke-width="1"/></pattern></defs>
  <rect x="90" y="88" width="1420" height="724" rx="32" fill="#f2ecdf"/>
  <rect x="90" y="88" width="1420" height="78" rx="32" fill="#ded4c3"/>
  <circle cx="138" cy="127" r="9" fill="#b94b3b"/><circle cx="168" cy="127" r="9" fill="#d69a45"/><circle cx="198" cy="127" r="9" fill="#6f8e72"/>
  <text x="1190" y="137" fill="#675f5b" font-family="Arial" font-size="22" font-weight="700">LOCAL / NO STORAGE</text>
  <text x="148" y="250" fill="#b94b3b" font-family="Arial" font-size="20" font-weight="800">YOU / 01</text>
  <text x="148" y="305" fill="#231f20" font-family="Arial" font-size="42" font-weight="700">I feel uncertain about my next step.</text>
  <text x="148" y="415" fill="#6f8e72" font-family="Arial" font-size="20" font-weight="800">ELIZA / 01</text>
  <text x="148" y="470" fill="#231f20" font-family="Arial" font-size="42" font-weight="700">What makes you feel uncertain about your next step?</text>
  <rect x="148" y="570" width="1304" height="164" rx="20" fill="#231f20"/>
  <text x="190" y="628" fill="#d69a45" font-family="Arial" font-size="18" font-weight="800">RESPONSE TRACE</text>
  <text x="190" y="690" fill="#f2ecdf" font-family="Arial" font-size="34" font-weight="700">feeling-reflection</text>
  <text x="760" y="690" fill="#f2ecdf" font-family="Arial" font-size="28">my → your</text>
</svg>
